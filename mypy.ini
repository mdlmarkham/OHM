[mypy]
python_version = 3.11
ignore_missing_imports = True
disable_error_code = attr-defined,no-redef,assignment,misc,name-defined,arg-type,index

[mypy.ohm.bayesian]
ignore_errors = True

[mypy.ohm.sdk]
ignore_errors = True

[mypy.ohm.framework.*]
ignore_errors = True

[mypy.ohm.inference.*]
ignore_errors = True

[mypy.ohm.patterns]
ignore_errors = True
