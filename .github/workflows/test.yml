name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip list | grep -E "duckdb|mypy|ruff|pytest"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/

      - name: Test with pytest
        run: |
          set +e
          python -m pytest tests/ --tb=long --benchmark-disable -r fEsxX --maxfail=10 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          echo "## pytest exit status: $status" >> "$GITHUB_STEP_SUMMARY"
          echo '<details><summary>Last 200 lines of pytest output</summary>' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 /tmp/pytest.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"
          exit $status
