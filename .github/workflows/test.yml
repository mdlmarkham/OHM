name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip list | grep -E "duckdb|mypy|ruff|pytest"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/

      - name: Test with pytest
        id: pytest
        run: |
          set +e
          python -m pytest tests/ --tb=long --benchmark-disable -r fEsxX --maxfail=10 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          echo "## pytest exit status: $status" >> "$GITHUB_STEP_SUMMARY"
          echo '<details><summary>Last 200 lines of pytest output</summary>' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 /tmp/pytest.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Post pytest tail as PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PY_VERSION: ${{ matrix.python-version }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "### pytest failure on Python ${PY_VERSION}"
            echo ""
            echo "<details><summary>Last 300 lines of pytest output</summary>"
            echo ""
            echo '```'
            tail -n 300 /tmp/pytest.log
            echo '```'
            echo "</details>"
          } > /tmp/comment.md
          jq -Rs '{body: .}' < /tmp/comment.md > /tmp/comment.json
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @/tmp/comment.json \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -o /tmp/comment-response.json -w "HTTP %{http_code}\n"
