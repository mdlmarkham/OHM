name: Test

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bayesian,markov]"
          pip list | grep -E "duckdb|pgmpy|networkx|numpy|mypy|ruff|pytest"

      - name: Check formatting with ruff
        run: python -m ruff format --check src/ tests/

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check server handlers with mypy
        run: python -m mypy src/ohm/server --ignore-missing-imports

      - name: Type check full source with mypy
        run: python -m mypy src/ --ignore-missing-imports

      - name: Check for bare except blocks
        run: |
          BARE=$(grep -rn '^\s*except\s*:\s*$' src/ tests/ || true)
          if [ -n "$BARE" ]; then
            echo "Bare 'except:' blocks found:"
            echo "$BARE"
            exit 1
          fi

      - name: Test (fast) with pytest
        run: |
          python -m pytest tests/ -v --tb=short --benchmark-disable \
            -m "not slow and not integration and not concurrent and not smoke" \
            --timeout=60 --timeout-method=thread -n auto --dist loadgroup \
            --junitxml=test-results.xml

      - name: Test (integration + slow) with pytest
        if: success() || failure()
        run: |
          python -m pytest tests/ -v --tb=short --benchmark-disable \
            -m "slow or integration" \
            --timeout=120 --timeout-method=thread -n 0 \
            -k "not concurrent"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  rust-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.toml') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" maturin

      - name: Build and install Rust extension
        run: |
          maturin build --release --manifest-path rust/Cargo.toml
          pip install rust/target/wheels/*.whl

      - name: Test Rust extension delegation
        run: |
          python -m pytest tests/test_mc.py -v --benchmark-disable --timeout=60

      - name: Verify Rust extension is active
        run: python -c "from ohm.mc import has_rust_extension; assert has_rust_extension(), 'Rust extension not loaded'"
