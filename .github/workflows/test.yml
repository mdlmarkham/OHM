name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip list | grep -E "duckdb|mypy|ruff|pytest"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/

      - name: Test with pytest
        id: pytest
        run: |
          set +e
          python -m pytest tests/ --tb=short --benchmark-disable -q --no-header 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          echo "## pytest (Python ${{ matrix.python-version }}) exit=$status" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 100 /tmp/pytest.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Push failure log to debug branch
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ci-debug/py${{ matrix.python-version }}-$(date +%Y%m%d-%H%M%S)"
          git config user.email "ci@github.com"
          git config user.name "CI Debug"
          git checkout -b "$BRANCH"
          cp /tmp/pytest.log ci-pytest-failure.log
          git add ci-pytest-failure.log
          git commit -m "ci: pytest failure log Python ${{ matrix.python-version }}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH"
          echo "Debug log pushed to branch: $BRANCH" >> "$GITHUB_STEP_SUMMARY"
